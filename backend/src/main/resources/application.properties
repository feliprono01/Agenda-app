spring.application.name=backend

# Importa el archivo local de desarrollo si existe (ignorado en producción)
# Los valores en application-local.properties sobreescriben los defaults
spring.config.import=optional:classpath:application-local.properties

# Perfil activo por defecto si no se define SPRING_PROFILES_ACTIVE
# En Railway definir: SPRING_PROFILES_ACTIVE=prod
spring.profiles.default=dev

# ─────────────────────────────────────────────
# Base de Datos
# Valores reales en application-local.properties (desarrollo)
# o en variables de entorno del servidor (producción)
# ─────────────────────────────────────────────
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/consultorio_db?createDatabaseIfNotExist=true}
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:}

# ─────────────────────────────────────────────
# JWT
# ─────────────────────────────────────────────
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:28800000}

# ─────────────────────────────────────────────
# WhatsApp Business API
# ─────────────────────────────────────────────
whatsapp.api.url=https://graph.facebook.com/v23.0
whatsapp.phone.number.id=${WHATSAPP_PHONE_ID}
whatsapp.access.token=${WHATSAPP_TOKEN}
whatsapp.template.name=recordatorio_turno
whatsapp.template.language=es_AR

# ─────────────────────────────────────────────
# Actuator — Health check para Railway/Render
# ─────────────────────────────────────────────
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never
