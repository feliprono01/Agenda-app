# ─────────────────────────────────────────────────────────────────
# PERFIL: DESARROLLO
# Activar con: SPRING_PROFILES_ACTIVE=dev
# (los secretos reales van en application-local.properties)
# ─────────────────────────────────────────────────────────────────

# Actualizar el schema automáticamente al iniciar
spring.jpa.hibernate.ddl-auto=update

# Mostrar SQL en consola para debugging
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Mostrar detalles de error en desarrollo
server.error.include-stacktrace=always
server.error.include-message=always
server.error.include-binding-errors=always

# Zona horaria
spring.jackson.time-zone=America/Argentina/Buenos_Aires
