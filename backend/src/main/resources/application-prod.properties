# ─────────────────────────────────────────────────────────────────
# PERFIL: PRODUCCIÓN
# Activar en Railway con: SPRING_PROFILES_ACTIVE=prod
# ─────────────────────────────────────────────────────────────────

# En producción la DB ya existe — validar el schema, nunca modificarlo
spring.jpa.hibernate.ddl-auto=validate

# No mostrar SQL en los logs (ruido + datos sensibles)
spring.jpa.show-sql=false

# No exponer detalles de errores en las respuestas HTTP
server.error.include-stacktrace=never
server.error.include-message=never
server.error.include-binding-errors=never

# Zona horaria del servidor (Argentina)
spring.jackson.time-zone=America/Argentina/Buenos_Aires
